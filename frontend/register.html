<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QueueFlow – Create Account</title>
    <meta name="description" content="Register a new QueueFlow account to start managing your place in the queue." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css" />
    <style>
        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 0.25rem;
        }

        .logo span {
            color: var(--secondary-color);
        }

        .logo-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .dots-bg {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }

        .center-screen {
            position: relative;
            z-index: 1;
        }

        .auth-card {
            max-width: 420px;
        }

        #errorMsg {
            display: none;
        }
    </style>
</head>

<body>
    <div class="dots-bg"></div>
    <div class="center-screen">
        <div class="glass-container auth-card animated">
            <div class="logo">Queue<span>Flow</span></div>
            <p class="logo-subtitle">Create your account</p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input id="name" type="text" class="form-control" placeholder="John Doe" required
                        autocomplete="name" />
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number <span style="color:var(--danger)">*</span></label>
                    <input id="phone" type="tel" class="form-control" placeholder="10-15 digit number" required
                        autocomplete="tel" />
                </div>
                <div class="form-group">
                    <label for="email">Email Address <span
                            style="color:var(--text-muted);font-size:0.8rem">(optional)</span></label>
                    <input id="email" type="email" class="form-control" placeholder="you@example.com"
                        autocomplete="email" />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" class="form-control" placeholder="Min. 6 characters" required
                        autocomplete="new-password" />
                </div>
                <p class="error-text" id="errorMsg"></p>
                <button type="submit" class="btn btn-primary" id="registerBtn">Create Account</button>
            </form>

            <p style="margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                Already have an account? <a href="index.html">Sign In</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        requireNoAuth();

        const form = document.getElementById('registerForm');
        const errorMsg = document.getElementById('errorMsg');
        const registerBtn = document.getElementById('registerBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            registerBtn.textContent = 'Creating Account...';
            registerBtn.disabled = true;

            try {
                const data = await apiRequest('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        phone: document.getElementById('phone').value,
                        email: document.getElementById('email').value || undefined,
                        password: document.getElementById('password').value,
                    })
                });

                const userObj = { ...data.data.user, type: 'user' };
                saveAuth(data.data.token, userObj);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            } finally {
                registerBtn.textContent = 'Create Account';
                registerBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
